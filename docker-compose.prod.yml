services:
  postgres:
    image: postgres:17
    container_name: dilamme-postgres
    restart: always
    env_file:
      - backend/.env
    volumes:
      - postgres_volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tobiloba} -d ${POSTGRES_DB:-dilamme_db}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7.4-alpine
    container_name: dilamme-redis
    restart: always
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    container_name: dilamme-backend
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    env_file:
      - backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    container_name: dilamme-worker
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    command: python manage.py run_workers
    env_file:
      - backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    container_name: dilamme-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        PORT: 3000
        NEXT_PUBLIC_API_URL: ""
        NEXT_PUBLIC_WS_URL: "wss://tobi-dilamme.duckdns.org/ws/live_job_updates/"
    env_file:
      - frontend/.env
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: dilamme-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certbot/www:/var/www/certbot:ro
      - ./nginx/certbot/conf:/etc/letsencrypt:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  postgres_volume:
  redis_data:
