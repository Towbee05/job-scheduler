services:
  postgres:
    image: postgres:17
    container_name: dilamme-postgres
    restart: always
    env_file:
      - backend/.env
    ports:
      - 5432:5432
    volumes:
      - postgres_volume:/var/lib/postgresql/data
  
  pgadmin_web:
    image: dpage/pgadmin4:latest
    container_name: pgadmin_container
    env_file:
      - backend/.env
    ports:
      - "8080:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres

  backend:
    container_name: dilamme-backend
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - 8000:8000
    env_file:
      - backend/.env
    depends_on:
      - redis
      - postgres

  frontend:
    container_name: dilamme-frontend
    build: ./frontend
    env_file:
      - frontend/.env
    ports:
      - 3000:3000
    volumes:
      - ./frontend:/app
    depends_on:
      - backend

  redis:
    image: redis:7.4-alpine
    container_name: dilamme-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis-insight:
    image: redis/redisinsight:latest
    container_name: redis_insight
    restart: unless-stopped
    ports:
      - "5540:5540"
    volumes:
      - redis_insight_data:/data
    depends_on:
      - redis

  worker:
    container_name: dilamme-worker
    env_file:
      - backend/.env
    build: ./backend
    command: python manage.py run_workers
    volumes:
      - ./backend:/app
    depends_on:
      - redis
      - postgres
    restart: always

volumes:
  postgres_volume:
  pgadmin_data:
  redis_data:
  redis_insight_data: 
